version: '3.8'

services:
  jito-bam-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jito-bam-sidecar
    ports:
      - "${PORT:-3030}:3030"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
